<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | PV Portfolio</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/animations.css"/>
  <style>
    body { background: var(--gradient-hero); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { background: white; border-radius: 1.5rem; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow-2xl); animation: scaleIn 0.4s ease both; }
    .login-logo { width: 60px; height: 60px; background: var(--gradient-primary); border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .login-logo svg { width: 32px; height: 32px; color: white; }
    .demo-note { background: rgba(37,99,235,0.07); border: 1px solid rgba(37,99,235,0.15); border-radius: 0.75rem; padding: 0.875rem 1rem; font-size: 0.8rem; color: var(--color-primary); margin-bottom: 1.5rem; line-height: 1.6; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/></svg>
  </div>
  <h1 style="text-align:center;font-size:1.5rem;font-weight:800;margin-bottom:0.25rem">Admin Login</h1>
  <p style="text-align:center;color:var(--color-text-secondary);font-size:0.84rem;margin-bottom:1.5rem">PV Portfolio — Muhammad Muti-ur-Rauf</p>

  <div class="demo-note">
    <strong>Setup Required:</strong> Connect Supabase to enable authentication.<br>
    See <code>supabase-schema.sql</code> and <code>README.md</code> for instructions. After setup, create your admin user from the Supabase dashboard under <strong>Authentication → Users</strong>.
  </div>

  <div id="login-alert"></div>

  <form id="admin-login-form" novalidate>
    <div class="form-group" style="margin-bottom:1.25rem">
      <label class="form-label" for="admin-email">Email Address</label>
      <input type="email" id="admin-email" name="email" class="form-control" placeholder="admin@yourdomain.com" required autocomplete="email"/>
    </div>
    <div class="form-group" style="margin-bottom:1.5rem">
      <label class="form-label" for="admin-password">Password</label>
      <div style="position:relative">
        <input type="password" id="admin-password" name="password" class="form-control" placeholder="Your password" required autocomplete="current-password" style="padding-right:3rem"/>
        <button type="button" onclick="togglePwd()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-muted)" aria-label="Toggle password">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" id="login-btn" class="btn btn-primary btn-ripple" style="width:100%;justify-content:center;padding:0.875rem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In to Admin
    </button>
  </form>
  <div style="text-align:center;margin-top:1.25rem">
    <a href="../index.html" style="font-size:0.8rem;color:var(--color-text-muted)">← Back to Portfolio</a>
  </div>
</div>

<script>
function togglePwd() {
  const f = document.getElementById('admin-password');
  f.type = f.type === 'password' ? 'text' : 'password';
}
function showAlert(type, msg) {
  document.getElementById('login-alert').innerHTML = `<div class="alert alert-${type}" style="margin-bottom:1rem">${msg}</div>`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/admin.js"></script>
<script src="../assets/js/projects.js"></script>
</body>
</html>
