<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Projects | Admin Panel</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/animations.css"/>
  <style>
    body { margin:0; background:var(--color-bg); }
    .admin-layout { display:flex; min-height:100vh; }
    .sidebar-nav { padding:var(--space-4) 0; flex:1; }
    .sidebar-section { padding:var(--space-2) var(--space-5); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.12em; color:rgba(255,255,255,0.35); font-weight:700; margin-top:var(--space-3); }
    .content-area { padding:var(--space-6); flex:1; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <div style="width:36px;height:36px;background:var(--gradient-primary);border-radius:0.5rem;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></div>
        <div><div class="brand-name">PV Portfolio</div><div class="brand-sub">Admin Panel</div></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html" class="admin-nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="sidebar-section">Content</div>
      <a href="manage-projects.html" class="admin-nav-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Manage Projects</a>
      <a href="manage-orders.html" class="admin-nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Order Requests</a>
      <div class="sidebar-section">Portfolio</div>
      <a href="../index.html" class="admin-nav-link" target="_blank"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View Live Site</a>
      <div class="sidebar-section">Account</div>
      <button class="admin-nav-link admin-logout-btn" style="width:100%;text-align:left;cursor:pointer;background:none;border:none;font-family:inherit;font-size:inherit"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div><h1 style="font-size:1.25rem;font-weight:700">Manage Projects</h1><p style="font-size:0.8rem;color:var(--color-text-muted)">Add, edit, or delete solar PV project entries</p></div>
      <div style="display:flex;gap:0.75rem">
        <button id="seed-btn" class="btn btn-ghost btn-sm" title="Seed all 49 projects from CSV data to Supabase">Seed CSV Data</button>
        <button id="add-project-btn" class="btn btn-primary btn-sm">+ Add Project</button>
      </div>
    </div>

    <div class="content-area">
      <div class="admin-card">
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr><th>Category</th><th>Title</th><th>Video</th><th>Drawing</th><th>Actions</th></tr></thead>
            <tbody id="projects-table-body">
              <tr><td colspan="5" style="text-align:center;color:var(--color-text-muted);padding:2rem">Loading projects…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Project Modal -->
<div class="modal-overlay" id="project-modal" role="dialog" aria-modal="true" aria-label="Project form">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h2 class="modal-title" id="project-form-title">Add Project</h2>
      <button class="modal-close" onclick="closeProjectModal()" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="project-form-alert"></div>
      <form id="project-form">
        <input type="hidden" id="project-id-hidden"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div class="form-group">
            <label class="form-label" for="pf-category">Category <span class="required">*</span></label>
            <select id="pf-category" class="form-control" style="appearance:auto;padding:0.75rem 1rem" required>
              <option value="">Select…</option>
              <option value="Industrial">Industrial</option>
              <option value="Commercial">Commercial</option>
              <option value="Residential">Residential</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="pf-thumbnail">Thumbnail URL (optional)</label>
            <input type="url" id="pf-thumbnail" class="form-control" placeholder="Leave blank to auto-generate from YouTube"/>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:1rem">
          <label class="form-label" for="pf-title">Project Title <span class="required">*</span></label>
          <input type="text" id="pf-title" class="form-control" placeholder="Full project title" required/>
        </div>
        <div class="form-group" style="margin-bottom:1rem">
          <label class="form-label" for="pf-youtube">YouTube Video URL <span class="required">*</span></label>
          <input type="url" id="pf-youtube" class="form-control" placeholder="https://www.youtube.com/watch?v=..." required/>
        </div>
        <div class="form-group" style="margin-bottom:1rem">
          <label class="form-label" for="pf-drawing">Drawing Link (Google Drive / Dropbox)</label>
          <input type="url" id="pf-drawing" class="form-control" placeholder="https://drive.google.com/..."/>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="pf-description">Description</label>
          <textarea id="pf-description" class="form-control" rows="4" placeholder="Project description…" style="resize:vertical"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" onclick="closeProjectModal()" class="btn btn-ghost">Cancel</button>
      <button type="button" id="project-save-btn" onclick="document.getElementById('project-form').dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}))" class="btn btn-primary">Save Project</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/projects.js"></script>
<script src="../assets/js/admin.js"></script>
</body>
</html>
